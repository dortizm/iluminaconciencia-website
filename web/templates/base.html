  <head>
    <!-- Site Title-->
    <title>{% block title %}IluminAconciencia{% endblock %}</title>

    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    {% block css %}{% endblock %}

<body>
<!-- Page Header-->
<!-- <header class="page-head header-panel-absolute"> -->

<!-- Preloader -->
<div class="metaportal_fn_preloader">
  <div class="loading-container">
    <div class="loading">
      <div class="l1">
        <div></div>
      </div>
      <div class="l2">
        <div></div>
      </div>
      <div class="l3">
        <div></div>
      </div>
      <div class="l4">
        <div></div>
      </div>
    </div>
  </div>
</div>

<!-- Main -->
<div class="metaportal_fn_main">

  
  {% block navegation %}{% include 'header.html' %}{% endblock %}
  
  {% block content %}

  {% endblock %}

  {% block footer %}{% include 'footer.html' %}{% endblock %}
    
  </div>
  <!-- !Content -->
  
  
  <!-- Totop -->
  <a href="#" class="metaportal_fn_totop">
    <span class="totop_inner">
      <span class="icon">
        <img src="{% static 'svg/down.svg' %}"alt="" class="fn__svg">
      </span>
      <span class="text">Inicio</span>
    </span>
  </a>
  <!-- /Totop -->

</div>
<!-- !Main -->

<!-- Scripts -->
<script type="text/javascript" src="{% static 'js/jquery.js' %}?ver=7.0"></script>
<script type="text/javascript" src="{% static 'js/plugins.js' %}?ver=7.0"></script>
<!--[if lt IE 10]> <script type="text/javascript" src="js/ie8.js?ver=7.0"></script> <![endif]-->
<script type="text/javascript" src="{% static 'js/init.js' %}?ver=7.0"></script>

  gtag('config', 'G-REL2BB48P4');
</script>
<script>
  function onSubmit(token) {
    document.getElementById("form").submit();
  }
