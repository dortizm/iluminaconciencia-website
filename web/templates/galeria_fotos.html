{% extends "base.html" %}
{% load static %}
{% block content %}
  
<!-- Content -->
<div class="metaportal_fn_content">

<div class="metaportal_fn_pagetitle">
  
  <div class="container small">
    <div class="pagetitle">
      <h3 class="fn__maintitle big" data-text="Multimedia" data-align="center">Multimedia</h3>
      <p>
        <a href="{% url 'index' %}">Inicio</a>
        <span class="divider">/</span>
        <span class="text">Imagenes</span>
      </p>
    </div>
  </div>
</div>
  
<!-- Section Divider -->
<div class="fn_cs_section_divider">
  <div class="divider">
    <span class="short"></span>
    <span class="long"></span>
    <span class="short"></span>
  </div>
</div>
<!-- !Section Divider -->


<!-- Similar Items -->
<div class="metaportal_fn_similar">
  <div class="metaportal_fn_drops">
    <ul class="grid">
      {% for foto in fotos %}
      <li>
        <div class="nft__item">
          <div class="img_holder">
            <a href="#" data-toggle="modal" data-target="#modal-{{ foto.id }}">
              <img src="{{foto.imagen_thumb.url}}" alt="">
            </a>
          </div>
          <div class="title_holder">
            <h3 class="fn_title">{{ foto.autor }}</h3>
            <p class="fn_title">{{ foto.nombre }}</p>
          </div>
          <!-- Modal -->
          <div class="modal fade" id="modal-{{ foto.id }}" tabindex="-1" role="dialog" aria-labelledby="myModalLabel" aria-hidden="true">
            <div class="modal-dialog">
              <div class="modal-content">
                  <div class="modal-body">
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                      <span aria-hidden="true">&times;</span>
                    </button>
                    <img src="{{foto.imagen_hd.url}}" alt="" class="img-fluid">
                  </div>
              </div>
            </div>
          </div>
          <!-- !Modal -->
        </div>
      </li>
      {% endfor %}
    </ul>
  </div>
</div>
<!-- !Similar Items -->
{% endblock %}
