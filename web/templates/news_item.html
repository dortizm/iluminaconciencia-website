{% extends "base.html" %}
{% load static %}
{% block content %}
  
<!-- Content -->
<div class="metaportal_fn_content">

<div class="metaportal_fn_pagetitle">
  
  <div class="container small">
    <div class="pagetitle">
      <h3 class="fn__maintitle big" data-text="Noticia" data-align="center">Noticia</h3>
      <p>
        <a href="{% url 'index' %}">Inicio</a>
        <span class="divider">/</span>
        <a href="{% url 'news_list' %}">Noticias</a>
      </p>
    </div>
  </div>
</div>
  
<!-- Section Divider -->
<div class="fn_cs_section_divider">
  <div class="divider">
    <span class="short"></span>
    <span class="long"></span>
    <span class="short"></span>
  </div>
</div>
<!-- !Section Divider -->

<!-- Content -->
  <div class="metaportal_fn_content mt-4"> 
    <div class="container small">
      <div class="metaportal_fn_minis">
        <div class="m_item">
          {{news_item.fecha}}
        </div>
      </div>
      <!-- Sidebar -->
      <div class="metaportal_fn_wsidebar">
        <!-- Left Sidebar -->
        <div class="sidebar_left">
          <!-- Single Title -->
          <div class="single_title">
            <h3 class="fn__maintitle" data-text="{{news_item.titulo}}" data-align="left">{{news_item.titulo}}</h3>
          </div>
          <!-- !Single Title -->
          <!-- Single Description -->
          <div class="single_desc">
            {% autoescape off %}
              {{news_item.cuerpo}}
            {% endautoescape %}
          </div>
          <!-- !Single Description -->
        </div>
        <!-- !Left Sidebar -->      
      </div>
      <!-- !Sidebar -->
    </div>        
  </div>
  <!-- !Content -->
{% endblock %}
